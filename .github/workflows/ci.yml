name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json, mbstring, pdo_sqlite, sqlite3
          coverage: none
      - uses: ramsey/composer-install@v4
      - run: composer validate --strict
      - run: find app config database routes tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: php -d zend.assertions=1 tests/structure.php
      - run: php artisan route:list --path=api
      - run: php artisan test
