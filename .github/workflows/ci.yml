name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - run: find app config database routes tests -name '*.php' -print0 | xargs -0 -n1 php -l
      - run: php -d zend.assertions=1 tests/structure.php
